app_id = "examples.full_suite_interactive"
protocol_version = "1"
entrypoint = "app_main:create"
required_capabilities = ["window.write"]
optional_capabilities = [
  "hdi.keyboard",
  "hdi.mouse",
  "hdi.trackpad",
  "hdi.touch",
  "sensor.thermal",
  "sensor.power",
  "sensor.motion",
  "sensor.camera",
  "sensor.microphone",
  "sensor.speaker",
]

[display]
native_width = 393
native_height = 852
bar_color_rgba = [0, 0, 0, 255]
