<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Luvatrix</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #020617;
        color: #e2e8f0;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #stage-wrap {
        position: relative;
        width: 100dvw;
        height: 100dvh;
      }
      #stage, #stage3d {
        display: block;
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      #stage3d {
        z-index: 0;
      }
      #stage {
        z-index: 1;
        outline: none;
        touch-action: none;
      }
      #status {
        position: fixed;
        left: 10px;
        top: 8px;
        font-size: 12px;
        display: none;
        opacity: 0.9;
        pointer-events: none;
      }
      #status[data-error="true"] {
        background: rgba(10, 16, 28, 0.9);
        color: #ffd24c;
        display: block;
        max-width: calc(100vw - 20px);
        padding: 10px 12px;
      }
    </style>
  </head>
  <body>
    <div id="stage-wrap">
      <canvas id="stage3d" aria-hidden="true"></canvas>
      <canvas id="stage" tabindex="0"></canvas>
    </div>
    <div id="status"></div>
    <script type="module" src="./runtime/luvatrix-web.js?v=dev-camera-20260526"></script>
  </body>
</html>
