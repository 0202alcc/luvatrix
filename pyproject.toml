[project]
name = "luvatrix"
version = "0.1.0"
description = "High-performance interactive UI runtime"
readme = "README.md"
requires-python = ">=3.14,<3.15"
dependencies = [
  "numpy>=2.4.2",
  "Pillow>=10.3.0",
  "torch>=2.4.0",
]

[project.optional-dependencies]
ios = [
  "pyobjc-framework-cocoa>=12.1",
  "pyobjc-framework-quartz>=12.1",
  "pyobjc-framework-Metal>=12.1",
]
vulkan = [
  "vulkan>=1.3.275.1",
]
web = [
  "websockets>=13.0",
]
dev = [
  "matplotlib>=3.10.8",
]

[project.scripts]
gateflow = "gateflow_cli.wrapper:main"
luvatrix = "main:main"

[tool.setuptools]
py-modules = ["main"]

[tool.setuptools.packages.find]
include = ["gateflow_cli*", "luvatrix*", "luvatrix_core*", "luvatrix_plot*", "luvatrix_ui*"]

[tool.uv.sources]
coinbasetraderbot = { path = "../CoinbaseTraderBot", editable = true }
