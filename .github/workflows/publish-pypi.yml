name: publish-pypi

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          version: "0.10.9"

      - name: Build distributions
        run: |
          uv build
          uvx --from cibuildwheel==4.1.0 cibuildwheel --platform android --output-dir dist
        env:
          CIBW_BUILD: "cp314-android_arm64_v8a cp314-android_x86_64"
          CIBW_ARCHS_ANDROID: "arm64_v8a x86_64"
          CIBW_ENVIRONMENT_ANDROID: "LUVATRIX_BUILD_ACCEL=1"

      - name: Reconcile PyPI files
        id: release
        run: python3 tools/release/pypi_release.py prepare

      - name: Upload missing distributions
        if: steps.release.outputs.publish == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-package-distributions
          path: upload-dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    if: needs.build.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/luvatrix/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-package-distributions
          path: upload-dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: upload-dist/
          skip-existing: true
          attestations: true

  verify:
    name: Verify PyPI release
    needs: [build, publish]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Verify all release files are on PyPI
        run: python3 tools/release/pypi_release.py verify
