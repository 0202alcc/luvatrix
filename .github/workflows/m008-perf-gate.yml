name: m008-perf-gate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  perf-gate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync deps
        run: uv sync
      - name: Runtime perf tests
        run: PYTHONPATH=. uv run pytest tests/test_planes_runtime.py tests/test_planes_v2_poc_example.py tests/test_m008_perf_gate.py
      - name: M-008 perf smoke gate
        run: PYTHONPATH=. uv run python ops/ci/m008_perf_gate.py --samples 60 --budget-p95-ms 40 --budget-jitter-ms 25
