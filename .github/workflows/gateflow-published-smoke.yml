name: gateflow-published-smoke

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  uvx-published-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Smoke published gateflow version command
        run: uvx --from gateflow==1.0.0 gateflow --version
      - name: Verify wrapper default resolves pinned version
        run: uv run gateflow --version
