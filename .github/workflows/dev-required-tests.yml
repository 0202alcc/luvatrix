name: dev-required-tests

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-required-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  required-tests:
    name: required-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Run repository test suite
        env:
          PYTHONPATH: .
        run: |
          uv run --with pytest pytest -q \
            tests/test_repository_test_policy.py \
            tests/test_luvatrix_public_app_api.py \
            tests/test_app_runtime.py \
            tests/test_main_cli.py \
            tests/test_scene_runtime.py \
            tests/test_planes_runtime.py \
            tests/test_display_runtime.py
