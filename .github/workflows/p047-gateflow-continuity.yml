name: p047-gateflow-continuity

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  gateflow-continuity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Sync deps
        run: uv sync
      - name: Verify pinned GateFlow version
        run: uvx --from gateflow==1.0.0 gateflow --version
      - name: Initialize sync metadata
        run: uvx --from gateflow==1.0.0 gateflow --root . sync from-main
      - name: Apply sync remediation (if needed)
        run: uvx --from gateflow==1.0.0 gateflow --root . sync apply
      - name: Verify sync status is clean
        run: uvx --from gateflow==1.0.0 gateflow --root . sync status
      - name: Verify planning validation pack
        run: uvx --from gateflow==1.0.0 gateflow --root . validate all
      - name: Run standalone gateflow continuity integration test
        run: PYTHONPATH=. uv run --with pytest pytest tests/test_gateflow_validate_all_ci.py -q
