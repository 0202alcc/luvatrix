name: p047-gateflow-continuity

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  gateflow-continuity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync deps
        run: uv sync
      - name: Run standalone gateflow continuity integration test
        run: PYTHONPATH=. uv run --with pytest pytest tests/test_gateflow_validate_all_ci.py -q
